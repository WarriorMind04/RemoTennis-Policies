<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>remoTennis</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:40px;
    }

    .container{
      max-width:700px;
    }

    h1{
      font-size:4rem;
      margin-bottom:20px;
    }

    p{
      font-size:1.2rem;
      line-height:1.7;
      color:#cbd5e1;
      margin-bottom:30px;
    }

    .buttons{
      display:flex;
      gap:20px;
      justify-content:center;
      flex-wrap:wrap;
    }

    a{
      text-decoration:none;
      background:white;
      color:#0f172a;
      padding:14px 28px;
      border-radius:12px;
      font-weight:600;
      transition:0.2s;
    }

    a:hover{
      transform:translateY(-2px);
      opacity:0.9;
    }

    .footer{
      margin-top:40px;
      color:#94a3b8;
      font-size:0.9rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🎾 RemoTennis!</h1>

    <p>
      Motion-controlled tennis for Apple TV.<br>
      Swing your remote like a real racket and enjoy fun arcade-style matches with friends and family.
    </p>

    <div class="buttons">
      <a href="support.html">Support</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>

    <div class="footer">
      © 2026 Guardians of MicroAgression. All rights reserved.
    </div>
  </div>

</body>
</html>
